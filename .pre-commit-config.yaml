ci:
  autoupdate_schedule: weekly
  autofix_prs: true
  autofix_commit_msg: "[pre-commit.ci] autofix"
  autoupdate_branch: main
  autoupdate_commit_msg: "[pre-commit.ci] autoupdate"

default_language_version:
  python: python3.14

default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/asottile/reorder-python-imports
    rev: v3.16.0
    hooks:
      - id: reorder-python-imports
        exclude: ^pre_commit/resources/
        args:
          - --py313-plus
          - --add-import
          - 'from __future__ import annotations'

  - repo: https://github.com/hhatto/autopep8
    rev: v2.3.2
    hooks:
      - id: autopep8

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies: [types-pyyaml]
        exclude: ^testing/resources/

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args:
          - --py314-plus

  - repo: https://github.com/JelleZijlstra/autotyping
    rev: 24.9.0
    hooks:
      - id: autotyping
        stages: [pre-commit]
        types: [python]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args:
          - --fix
          - --show-fixes
          - --unsafe-fixes
          - --exit-non-zero-on-fix
          - --output-format=github
          types_or:
           - python
           - pyi
      - id: ruff-format
          types_or:
           - python
           - pyi

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args:
          - --allow-multiple-documents
          - --unsafe
        exclude: ^(docs/)
      - id: check-json
      - id: check-toml
      - id: check-ast
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args:
          - --fix=lf
      - id: debug-statements
      - id: requirements-txt-fixer
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-builtin-literals
      - id: check-symlinks
      - id: pretty-format-json
        args:
          - --autofix
        exclude: ^(custom_components/jackery_solarvault/manifest.*|tests/|docs/|scripts/)
      - id: fix-byte-order-marker
      - id: double-quote-string-fixer
      - id: name-tests-test
      - id: detect-private-key
      - id: detect-aws-credentials
      - id: destroyed-symlinks

  - repo: local
    hooks:
      - id: docs-html-build
        name: build docs HTML with bun
        entry: bun run docs:build
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$

      - id: gate-check
        name: jackery_solarvault unified gate (read-only)
        entry: python scripts/gate.py --check --fast
        language: system
        pass_filenames: false
        stages: [manual]
