ci:
  autoupdate_schedule: weekly
  autofix_prs: true
  autofix_commit_msg: "[pre-commit.ci] autofix"
  autoupdate_branch: main
  autoupdate_commit_msg: "[pre-commit.ci] autoupdate"

default_language_version:
  python: python3.14

default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args:
          - --py314-plus
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        # Deferred quality gate (AGENTS.md note 2026-06-06, BUG_LIST.md §9):
        # strict-typing debt is tracked and worked off separately. Run via
        #   pre-commit run --hook-stage manual mypy
        # CI runs mypy from the full environment (validate.yml) instead —
        # this isolated hook env lacks homeassistant-stubs and reports
        # false "Any" subclass errors.
        stages: [manual]
        additional_dependencies: [types-pyyaml, pydantic]
        exclude: ^(manifest.*|docs/|scripts/)
  - repo: https://github.com/JelleZijlstra/autotyping
    rev: 24.9.0
    hooks:
      - id: autotyping
        stages: [pre-commit]
        types: [python]
        args: [--safe]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args:
          - --fix
          - --show-fixes
          - --unsafe-fixes
          - --preview
          - --target-version py314
          - --extend-select=RUF100
          - --output-format=github
        types_or:
          - python
          - pyi
      - id: ruff-format
        types_or:
          - python
          - pyi

  - repo: local
    hooks:
      - id: smellcheck
        name: smellcheck (requires `pip install smellcheck==0.3.10`)
        language: system
        entry: python -m smellcheck
        # Scan fixed repo-relative roots (the baseline stores repo-relative
        # fingerprints; absolute staged paths never match). All behavior is
        # pinned via explicit flags — the isolated upstream hook env ignored
        # [tool.smellcheck] and produced unreproducible results.
        pass_filenames: false
        # Gate on errors only: ~21 of smellcheck's cross-file fingerprints
        # are unstable between identical runs, so a warning-level baseline
        # gate flaps. The baseline still suppresses stable warning noise;
        # warning burn-down is the refactoring engine's job.
        args:
          - --fail-on
          - error
          - --baseline
          - .smellcheck-baseline.json
          - --no-cache
          - coderabbit
          - custom_components
          - scripts
          - tests

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args:
          - --allow-multiple-documents
          - --unsafe
        exclude: ^(docs/|scripts/)
      - id: check-json
      - id: check-toml
      - id: check-ast
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args:
          - --fix=lf
      - id: debug-statements
      - id: requirements-txt-fixer
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-builtin-literals
      - id: check-symlinks
      - id: pretty-format-json
        args:
          - --autofix
        # manifest key order is owned by hassfest; translation file format
        # (strings.json key order, raw UTF-8) is owned by
        # scripts/sync_translations; the smellcheck baseline is
        # machine-generated compact JSON (pretty-printing bloats it past the
        # large-file gate).
        exclude: ^(custom_components/jackery_solarvault/(manifest.*|translations/)|tests/|docs/|scripts/|\.smellcheck-baseline\.json)
      - id: fix-byte-order-marker
      - id: detect-private-key
      - id: destroyed-symlinks
