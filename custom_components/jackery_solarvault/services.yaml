rename_system:
  fields:
    system_id:
      required: true
      example: '595364183558991872'
      selector:
        text: null
    new_name:
      required: true
      example: Balkonkraftwerk Süd
      selector:
        text: null
refresh_weather_plan:
  fields:
    device_id:
      required: true
      example: '573702884982521856'
      selector:
        device:
          integration: jackery_solarvault
refresh_subdevices:
  fields:
    device_id:
      required: true
      example: '573702884982521856'
      selector:
        device:
          integration: jackery_solarvault
delete_storm_alert:
  fields:
    device_id:
      required: true
      example: '573702884982521856'
      selector:
        device:
          integration: jackery_solarvault
    alert_id:
      required: true
      example: A1746110400
      selector:
        text: null
set_third_party_mqtt_config:
  fields:
    device_id:
      required: true
      example: '573702884982521856'
      selector:
        device:
          integration: jackery_solarvault
    enable:
      required: true
      example: true
      selector:
        boolean: null
    ip:
      required: true
      example: 192.168.2.212
      selector:
        text: null
    port:
      required: true
      example: 1883
      selector:
        number:
          min: 1
          max: 65535
          mode: box
    username:
      example: mqtt_user
      selector:
        text: null
    password:
      example: '12345678'
      selector:
        text: null
    token:
      example: ''
      selector:
        text: null
query_third_party_mqtt_config:
  fields:
    device_id:
      required: true
      example: '573702884982521856'
      selector:
        device:
          integration: jackery_solarvault
send_ble_command:
  fields:
    device_id:
      required: true
      example: '573702884982521856'
      selector:
        device:
          integration: jackery_solarvault
    cmd:
      required: true
      example: 107
      selector:
        number:
          min: 1
          max: 65535
          mode: box
    body:
      required: true
      example:
        cmd: 107
        swEps: 1
      selector:
        object: null
    flags:
      example: 0
      default: 0
      selector:
        number:
          min: 0
          max: 65535
          mode: box
    wait_for_ack:
      example: false
      default: false
      selector:
        boolean: null
    ack_timeout:
      example: 15.0
      default: 15.0
      selector:
        number:
          min: 0.5
          max: 60.0
          step: 0.5
          unit_of_measurement: s
          mode: box
send_device_schedule:
  fields:
    device_id:
      required: true
      example: '573702884982521856'
      selector:
        device:
          integration: jackery_solarvault
    action_id:
      required: true
      example: 3015
      selector:
        number:
          min: 3015
          max: 3018
          mode: box
    body:
      required: true
      example:
        actionType: 3
        taskType: 2
        mode: 2
        pw: 700
        sysSwitch: 1
        end: 06:00
        loops: '1111111'
        start: 04:00
        tid: '1776477689'
      selector:
        object: null
