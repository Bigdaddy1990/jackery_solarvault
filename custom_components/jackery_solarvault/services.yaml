# Experimental: configure the device's third-party MQTT bridge. Sends
# actionId 3046 (SET_THIRD_PARTY_MQTT_CONFIG) over the existing cloud MQTT
# command topic with PLAINTEXT credentials. PROTOCOL.md §15 marks the cloud
# REST relay as blocked for SolarVault; the publish path has not yet been
# observed to be filtered. If the device responds, the bridge starts pushing
# telemetry to your broker. If nothing arrives in the configured Mosquitto,
# the device firmware probably requires AES-256-CBC-encrypted credentials —
# the integration will need to capture the per-device ``bluetoothKey`` and
# encrypt before sending. Use ``query_third_party_mqtt_config`` to read the
# config back.
set_third_party_mqtt_config:
  fields:
    device_id:
      required: true
      example: "573702884982521856"
      selector:
        device:
          integration: jackery_solarvault
    enable:
      required: true
      example: true
      selector:
        boolean:
    ip:
      required: true
      example: "192.168.2.212"
      selector:
        text:
    port:
      required: true
      example: 1883
      selector:
        number:
          min: 1
          max: 65535
          mode: box
    username:
      example: "mqtt_user"
      selector:
        text:
    password:
      example: "12345678"
      selector:
        text:
    token:
      example: ""
      selector:
        text:

query_third_party_mqtt_config:
  fields:
    device_id:
      required: true
      example: "573702884982521856"
      selector:
        device:
          integration: jackery_solarvault

# Experimental: send one raw BLE binary command frame to the SolarVault.
# The body must be a JSON object (YAML mapping or JSON string). Include the
# firmware-level ``cmd`` field in the body when the target command expects it.
# Requires both ``enable_ble_transport`` and ``enable_ble_writes`` to be on
# and an active BLE session to the selected device.
send_ble_command:
  fields:
    device_id:
      required: true
      example: "573702884982521856"
      selector:
        device:
          integration: jackery_solarvault
    cmd:
      required: true
      example: 107
      selector:
        number:
          min: 1
          max: 65535
          mode: box
    body:
      required: true
      example:
        cmd: 107
        swEps: 1
      selector:
        object:
    flags:
      example: 0
      default: 0
      selector:
        number:
          min: 0
          max: 65535
          mode: box
    wait_for_ack:
      example: false
      default: false
      selector:
        boolean:
    ack_timeout:
      example: 15.0
      default: 15.0
      selector:
        number:
          min: 0.5
          max: 60.0
          step: 0.5
          unit_of_measurement: s
          mode: box

# Experimental: publish a DownloadDeviceSchedule frame (TIMER_TASK_ADD=3015,
# DELETE=3016, UPDATE=3017, READ=3018). Body shape is the Frida-PCAP layout
# documented in docs/Markdown/MQTT_PROTOCOL.md §DownloadDeviceSchedule:
# {actionType, taskType, mode, pw, sysSwitch, end, loops, start, tid}.
# The integration injects only cmd=112; the rest of the body is passed
# verbatim so users can match the observed wire layout. Use this service
# with caution — schedule semantics may differ per SolarVault firmware.
send_device_schedule:
  fields:
    device_id:
      required: true
      example: "573702884982521856"
      selector:
        device:
          integration: jackery_solarvault
    action_id:
      required: true
      example: 3015
      selector:
        number:
          min: 3015
          max: 3018
          mode: box
    body:
      required: true
      example:
        actionType: 3
        taskType: 2
        mode: 2
        pw: 700
        sysSwitch: 1
        end: "06:00"
        loops: "1111111"
        start: "04:00"
        tid: "1776477689"
      selector:
        object:
