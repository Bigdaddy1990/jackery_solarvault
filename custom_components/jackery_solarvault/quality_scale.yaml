# Quality scale self-declaration for Jackery SolarVault.
#
# Format mirrors the per-rule status used by Home Assistant core integrations.
# Per HA developer docs: every integration with a config flow declares the
# bronze tier, then optionally progresses through silver / gold / platinum.
# Status values: done | exempt | todo. Use 'comment' to explain exemptions
# or work-in-progress items.
rules:
  # ----------------- Bronze (mandatory) -----------------
  action-setup:
    status: exempt
    comment: >-
      Integration does not register custom service actions; setters are exposed
      as standard number/switch/select/button/text entities. No services.yaml-
      backed actions need explicit setup.
  appropriate-polling:
    status: done
    comment: >-
      30 s coordinator interval matches the Jackery app polling rate. MQTT
      push reduces effective polling load further. Confirmed against
      docs/APP_POLLING_MQTT.md.
  brands: done
  common-modules: done
  config-flow-test-coverage:
    status: done
    comment: >-
      tests/ha/test_config_flow_ha.py covers the four critical paths:
      happy-path entry creation, invalid_auth surfaces invalid_auth
      error, network failure surfaces cannot_connect error, and a
      duplicate username aborts with already_configured. Reauth flow
      is also covered end-to-end with password rotation.
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No service actions; entity-driven setters only.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id:
    status: done
    comment: >-
      Unique ID contract documented in docs/UNIQUE_ID_CONTRACT.md and
      enforced by tests/test_code_quality.py.
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # ----------------- Silver -----------------
  action-exceptions:
    status: exempt
    comment: No service actions defined.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: done
    comment: >-
      Implemented in JackeryConfigFlow.async_step_reauth /
      async_step_reauth_confirm. Five sites in coordinator.py and one
      in __init__.py raise ConfigEntryAuthFailed which Home Assistant
      routes back to the reauth UI step. Translations cover EN and DE.
  test-coverage:
    status: done
    comment: >-
      161 source-only unit tests (parser, period contract, MQTT
      protocol, reauth, MQTT stability, battery-pack lifecycle) plus
      HA-fixture tests in tests/ha/ for config-flow and entry setup
      lifecycle. CI separates the two via the ha-fixture-tests job in
      .github/workflows/validate.yml so the lightweight unit tests
      remain runnable without the heavy HA test stack.

  # ----------------- Gold -----------------
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Cloud-push integration; no LAN discovery applicable.
  discovery:
    status: exempt
    comment: Cloud-only — no zeroconf/SSDP/Bluetooth surface.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: done
    comment: >-
      Battery packs are auto-added on first appearance via MQTT/HTTP merge.
      _drop_stale_battery_packs returns dropped_indices so the coordinator
      can queue HA device-registry removals; _async_update_data drains
      the queue every refresh via async_cleanup_pending_device_removals.
      The HA device registry therefore converges with the coordinator's
      pack list within one refresh of a permanent removal.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations:
    status: done
    comment: >-
      All five user-facing exceptions (3 service-action handlers in
      __init__.py, 2 MQTT-command paths in coordinator.py) carry
      translation_domain=DOMAIN + translation_key + placeholders.
      strings.json + en.json + de.json define the matching exceptions
      block.
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: done
    comment: >-
      Battery-pack cleanup runs on every coordinator merge:
      _drop_stale_battery_packs removes packs that have been silent past
      BATTERY_PACK_STALE_THRESHOLD_SEC (7 days). Stale-helper cleanup
      runs at startup. Stale-pack count is exposed in diagnostics.

  # ----------------- Platinum -----------------
  async-dependency: done
  inject-websession:
    status: exempt
    comment: >-
      MQTT path uses gmqtt directly (not aiohttp). HTTP API uses an
      independently-managed aiohttp session bound to the entry lifecycle.
  strict-typing:
    status: done
    comment: >-
      Source modules pass python -m mypy custom_components/jackery_solarvault
      under the integration's strict Home Assistant typing profile on
      Python 3.14.
