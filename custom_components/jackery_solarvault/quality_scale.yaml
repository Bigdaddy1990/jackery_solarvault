rules:
  action-setup:
    status: done
    comment: async_setup registers all three service actions once per domain and forwards
      work to the loaded config-entry coordinators. services.yaml defines the action
      schema, translations/*.json define labels/descriptions, and icons.json defines
      action icons. Entity-native setters remain exposed via number/switch/select/button/text
      platforms where possible.
  appropriate-polling:
    status: done
    comment: 30 s DataUpdateCoordinator interval matches the Jackery app polling rate.
      MQTT push is optional and can short-circuit HTTP refreshes between keep-alive
      windows. Confirmed against docs/APP_POLLING_MQTT.md.
  brands: done
  common-modules: done
  config-flow-test-coverage:
    status: done
    comment: 'tests/ha/test_config_flow_ha.py covers the four critical paths: happy-path
      entry creation, invalid_auth surfaces invalid_auth error, network failure surfaces
      cannot_connect error, and a duplicate username aborts with already_configured.
      Reauth flow is also covered end-to-end with password rotation.'
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: done
    comment: README.md and localized README files document rename_system, refresh_weather_plan
      and delete_storm_alert; services.yaml defines their field schemas and translations/*.json
      define the user-facing action and field text.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id:
    status: done
    comment: Unique ID contract documented in docs/UNIQUE_ID_CONTRACT.md and enforced
      by tests/test_code_quality.py.
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done
  action-exceptions:
    status: done
    comment: All service action handlers raise ServiceValidationError with translation_domain,
      translation_key and placeholders; lower-level JackeryError/LookupError details
      are logged at debug and surfaced through translated Home Assistant exceptions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: done
    comment: Implemented in JackeryConfigFlow.async_step_reauth / async_step_reauth_confirm.
      Five sites in coordinator.py and one in __init__.py raise ConfigEntryAuthFailed
      which Home Assistant routes back to the reauth UI step. Translations cover EN,
      DE, ES and FR.
  test-coverage:
    status: done
    comment: 184 source-only unit tests (parser, period contract, MQTT protocol, reauth,
      MQTT stability, battery-pack lifecycle) plus HA-fixture tests in tests/ha/ for
      config-flow and entry setup lifecycle. CI separates the two via the ha-fixture-tests
      job in .github/workflows/validate.yml so the lightweight unit tests remain runnable
      without the heavy HA test stack.
  devices: done
  diagnostics:
    status: done
    comment: diagnostics.py implements both config-entry diagnostics and per-device
      diagnostics. Both paths redact sensitive fields and anonymize outer payload
      map keys so device IDs, serials and locations are not exposed.
  discovery-update-info:
    status: done
    comment: Local discovery surfaces are declared in manifest.json for Bluetooth, DHCP, MQTT and Zeroconf. Their config-flow steps only prefill/route users to authenticated account setup and abort duplicates, because the authoritative device list and live update metadata still come from the Jackery account plus runtime HTTP/MQTT/BLE refreshes.
  discovery:
    status: done
    comment: manifest.json advertises Bluetooth service UUID 0000bdee-0000-1000-8000-00805f9b34fb with manufacturer 18434, DHCP hostnames solarvault*/jackery* on MAC prefix 80F1B2*, MQTT discovery, and Zeroconf service _jackery-solarvault._tcp.local.; config_flow.py implements async_step_bluetooth, async_step_dhcp, async_step_mqtt and async_step_zeroconf with duplicate-flow protection.
  docs-data-update:
    status: done
    comment: README.md, custom_components/jackery_solarvault/README.md and localized docs/README.*.md document that local discovery triggers setup while account-backed HTTP, Jackery MQTT push, BLE and optional local third-party MQTT provide runtime data according to docs/DATA_SOURCE_PRIORITY.md and docs/APP_POLLING_MQTT.md.
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: done
    comment: Dynamic runtime devices are discovered from account/system metadata and refreshed by HTTP/MQTT/BLE payloads. Main units, smart meters and accessories are added from the cloud/MQTT merge, while battery packs are auto-added on first appearance and stale packs queue HA device-registry removals after BATTERY_PACK_STALE_THRESHOLD_SEC. Discovery manifest triggers do not claim device ownership until the account-backed coordinator confirms the runtime device list.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations:
    status: done
    comment: All five user-facing exceptions (3 service-action handlers in __init__.py,
      2 MQTT-command paths in coordinator.py) carry translation_domain=DOMAIN + translation_key
      + placeholders. translations/*.json define the matching exceptions block; strings.json
      is kept only as a local parity fixture for tests and is not relied on by Home
      Assistant custom integration loading.
  icon-translations: done
  reconfiguration-flow:
    status: done
    comment: JackeryConfigFlow.async_step_reconfigure lets users update password and
      optional sensor toggles without removing the entry. The account email must match
      the entry's unique_id; mismatched accounts abort with a translated reason so
      the unique-id contract stays stable across reconfigure round-trips.
  repair-issues:
    status: done
    comment: app_data_inconsistency is created with is_fixable=True and routed through
      repairs.py. The fix flow confirms with the user, then calls coordinator.async_request_refresh()
      so transient cloud contradictions clear themselves; the issue auto-resolves
      on the next consistent payload.
  stale-devices:
    status: done
    comment: 'Battery-pack cleanup runs on every coordinator merge: _drop_stale_battery_packs
      removes packs that have been silent past BATTERY_PACK_STALE_THRESHOLD_SEC (30
      days). Stale-helper cleanup runs at startup. Stale-pack count is exposed in
      diagnostics.'
  docs-diagnostics:
    status: done
    comment: docs/diagnostics.md documents the diagnostics payload structure including
      rejection_metrics and schema_version. diagnostics.py implements both config-entry
      and per-device diagnostics with redacted sensitive fields.
  async-dependency: done
  inject-websession:
    status: exempt
    comment: MQTT path uses aiomqtt directly (not aiohttp). HTTP API uses an independently-managed
      aiohttp session bound to the entry lifecycle.
  strict-typing:
    status: todo
    comment: Strict typing is not claimed as complete while pyproject.toml still uses
      ignore_missing_imports and integration-level mypy error-code exceptions. Re-enable
      this only after a current mypy run is documented with the final Home Assistant
      typing profile.
