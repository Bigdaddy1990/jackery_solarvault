name: HA pip smoke test (py3.14)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

env:
  BUN_CONFIG_TELEMETRY_DISABLED: "0"
  DO_NOT_TRACK: "0"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"

      - name: Install Bun tooling
        run: bun install

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            pyproject.toml

      - name: Show Python environment
        run: bun run smoke:show-env

      - name: Upgrade pip
        run: bun run smoke:upgrade-pip

      - name: Install Home Assistant and jackery_solarvault
        env:
          HA_SPEC: ${{ format('=={0}', vars.HA_VERSION != '' && vars.HA_VERSION || '2026.6.1') }}
        run: bun run smoke:install-ha

      - name: Prepare Home Assistant config
        run: bun run smoke:prepare-config

      - name: Validate installation with hass --script check_config
        run: bun run ha:smoke
