name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
          persist-credentials: true

      - uses: home-assistant/actions/hassfest@master
      # Commit all changed files back to the repository
      - uses: stefanzweifel/git-auto-commit-action@v7
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands
          repository: ${{ github.repository }}
          ref: ${{ github.head_ref }}
          # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
          persist-credentials: true
          # Commit all changed files back to the repository
      - uses: stefanzweifel/git-auto-commit-action@v7

  tests:
    name: Tests (Python 3.14)
    uses: ./.github/workflows/reusable-python-tests.yml
    secrets: inherit
    with:
      python-version: "3.14"
      run-codecov: true
      upload-coverage-artifact: true
      coverage-min: "85"
      critical-module-coverage-min: "90"
      coverage-artifact-name: ci-coverage-report
      upload-junit-artifact: true
      junit-artifact-name: ci-junit-report
      publish-pages: false
