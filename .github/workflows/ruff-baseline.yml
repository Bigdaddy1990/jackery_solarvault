# .github/workflows/ruff-baseline.yml
name: Ruff baseline (web only)
on: { workflow_dispatch: {} }
permissions: { contents: write }
env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}
  RUFF_VERSION: ${{ vars.RUFF_VERSION != '' && vars.RUFF_VERSION || '0.15.12' }}
  RUFF_TARGET_VERSION: py314
jobs:
  baseline:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' && (
          (vars.RUFF_BASELINE_ALLOWLIST == '' && github.actor == github.repository_owner) ||
          (vars.RUFF_BASELINE_ALLOWLIST != '' && contains(format(',{0},', vars.RUFF_BASELINE_ALLOWLIST), format(',{0},', github.actor)))
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pinned Ruff with Python 3.14 support
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==${RUFF_VERSION}"
          python -m ruff --version
      - name: Ruff baseline using explicit Python 3.14 target
        run: |
          set -o pipefail

          # First apply all safe and unsafe Ruff fixes. This handles rules such
          # as SIM108 before the workflow falls back to baseline noqa markers.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --fix \
            --unsafe-fixes \
            --output-format=concise \
            --exit-zero

          # Format before the local Python 3.14 guard so any formatter drift is
          # converted back to the canonical exception style automatically.
          python -m ruff format . --target-version "${RUFF_TARGET_VERSION}"
          python scripts/verify_py314_exception_style.py --fix

          # Only remaining non-fixable diagnostics become baseline noqa markers.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --add-noqa \
            --output-format=concise \
            --exit-zero

          # Remove stale noqa markers created by older baseline runs.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --extend-select RUF100 \
            --fix \
            --output-format=concise \
            --exit-zero

          # Final formatting pass plus local guard keeps Python 3.14 exception
          # headers stable even when Ruff's formatter output changes.
          python -m ruff format . --target-version "${RUFF_TARGET_VERSION}"
          python scripts/verify_py314_exception_style.py --fix
          python scripts/verify_py314_exception_style.py

          # Emit final diagnostics as GitHub annotations without failing the
          # baseline job after fix/noqa generation has completed.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --output-format=github \
            --exit-zero

      - name: Commit baseline changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No ruff baseline changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: ruff baseline (format+fix)"
          git push origin "HEAD:${GITHUB_REF_NAME}"
