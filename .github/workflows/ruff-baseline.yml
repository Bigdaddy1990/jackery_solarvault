# .github/workflows/ruff-baseline.yml
name: Ruff baseline (web only)
on: { workflow_dispatch: {} }
permissions: { contents: write, pull-requests: write, actions: write, checks: write }
env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}
jobs:
  baseline:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' && (
          (vars.RUFF_BASELINE_ALLOWLIST == '' && github.actor == github.repository_owner) ||
          (vars.RUFF_BASELINE_ALLOWLIST != '' && contains(format(',{0},', vars.RUFF_BASELINE_ALLOWLIST), format(',{0},', github.actor)))
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install --upgrade pip ruff pre-commit
      - run: |
          ruff check . --fix .\custom_components\jackery_solarvault\ || true
          ruff check . --unsafe-fixes .\custom_components\jackery_solarvault\ || true
          ruff check . --target-version py314 .\custom_components\jackery_solarvault\|| true
          ruff check . --preview .\custom_components\jackery_solarvault\ || true
          ruff check . --line-length 88 .\custom_components\jackery_solarvault\ || true
          ruff check . --show-fixes .\custom_components\jackery_solarvault\ || true
          ruff check . --add-noqa .\custom_components\jackery_solarvault\ || true
          ruff check . --extend-select "E","F","I","B","UP","ASYNC","D","W","RUF100","INP","F541","ANN","Q","SIM","NPY","N","E501" .\custom_components\jackery_solarvault\ || true
          ruff format .\custom_components\jackery_solarvault\ || true
          ruff check . --fix .\custom_components\jackery_solarvault\ || true
          ruff check . --output-format=github .\custom_components\jackery_solarvault\ || true
          ruff check . --fix .\tests\ || true
          ruff check . --unsafe-fixes .\tests\ || true
          ruff check . --target-version py314 .\tests\ || true
          ruff check . --preview .\tests\ || true
          ruff check . --line-length 88 .\tests\ || true
          ruff check . --show-fixes .\tests\ || true
          ruff check . --add-noqa .\tests\ || true
          ruff check . --extend-select "E","F","I","B","UP","TID","A001","ASYNC","D","W","RUF","INP","F541","ANN","Q","SIM","NPY","N","E501" .\tests\ || true
          ruff check . --fix .\tests\ || true
          ruff check . --output-format=github .\tests\ || true
          ruff format .\tests\ || true
          ruff check . --fix || true
          ruff check . --unsafe-fixes || true
          ruff check . --target-version py314 || true
          ruff check . --preview || true
          ruff check . --line-length 88 || true
          ruff check . --show-fixes || true
          ruff check . --add-noqa || true
          ruff check . --extend-select "E","F","I","B","UP","TID","A001","ASYNC","D","W","RUF","INP","F541","ANN","Q","SIM","NPY","N","E501" || true
          ruff check . --fix || true
          ruff check . --output-format=github || true
          ruff format .


      - name: Commit baseline changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No ruff baseline changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: ruff baseline (format+fix)"
          git push origin "HEAD:${GITHUB_REF_NAME}"

    #- uses: peter-evans/create-pull-request@v8
     #  with:
     #    branch: chore/ruff-baseline
     #    title: "chore: ruff baseline (format+fix)"
     #    commit-message: "chore: ruff baseline (format+fix)"
     #    body: "Automated ruff baseline via GitHub Actions."
