# .github/workflows/ruff-baseline.yml
name: Ruff baseline (web only)
on: { workflow_dispatch: {} }
permissions: { contents: write }
env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}
  RUFF_TARGET_VERSION: py314
  BUN_CONFIG_TELEMETRY_DISABLED: "0"
  DO_NOT_TRACK: "0"
jobs:
  baseline:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' && (
          (vars.RUFF_BASELINE_ALLOWLIST == '' && github.actor == github.repository_owner) ||
          (vars.RUFF_BASELINE_ALLOWLIST != '' && contains(format(',{0},', vars.RUFF_BASELINE_ALLOWLIST), format(',{0},', github.actor)))
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"
      - run: bun install
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pinned Ruff with Python 3.14 support
        run: |
          bun run install:ruff-baseline
          python -m ruff --version
      - name: Ruff baseline using explicit Python 3.14 target
        run: |
          set -o pipefail

          # First apply safe Ruff fixes before the workflow falls back to
          # baseline noqa markers for remaining diagnostics.
          bun run autofix

          # Only remaining non-fixable diagnostics become baseline noqa markers.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --add-noqa \
            --output-format=github \
            --exit-zero

          # Remove stale noqa markers created by older baseline runs.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --extend-select RUF100 \
            --fix \
            --output-format=github \
            --exit-zero

          # Emit final diagnostics as GitHub annotations without failing the
          # baseline job after fix/noqa generation has completed.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --output-format=github \
            --exit-zero

          python -m pre-commit-lite check .
          bun run pre-commit
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Commit baseline changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No ruff baseline changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: ruff baseline (format+fix)"
          git push origin "HEAD:${GITHUB_REF_NAME}"
