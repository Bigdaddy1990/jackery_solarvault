name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 4 * * *"

jobs:
  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run pure unit tests
        run: |
           PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_power_math.py
           PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_stat_metadata.py
