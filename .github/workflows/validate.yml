name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Daily run catches HACS/hassfest spec changes that affect this repo
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  ruff:
    name: Ruff lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check custom_components/ tests/
      - name: Format check
        run: ruff format --check custom_components/ tests/

  unit-tests:
    name: Unit / source-only tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install unit-test deps
        run: python -m pip install pytest pytest-asyncio PyYAML
      - name: Compile integration and tests
        run: python -m compileall -q custom_components tests
      - name: Run pure unit tests without HA plugin autoload
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q -p no:cacheprovider -o addopts="" tests/test_*.py

  ha-fixture-tests:
    name: HA fixture tests
    runs-on: ubuntu-latest
    if: ('tests/ha/**') != ''
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Home Assistant test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Run HA fixture tests
        run: pytest -q -p no:cacheprovider -c pytest-ha.ini tests/ha
