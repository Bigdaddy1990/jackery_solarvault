name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Daily run catches HACS/hassfest spec changes that affect this repo
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}
  BUN_VERSION: "1.2.14"
  BUN_CONFIG_TELEMETRY_DISABLED: "0"
  DO_NOT_TRACK: "0"

jobs:
  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - uses: hacs/action@main
        with:
          category: integration

  ruff:
    name: Ruff lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            pyproject.toml
            package.json
      - name: Install Ruff
        run: |
           bun run install:unit && 
           python -m pip install ruff
      - name: Format check
        run: bun run format:check

  unit-tests:
    name: Unit / source-only tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            pyproject.toml
            package.json
      - name: Install unit-test deps
        run: bun run install:unit
      - name: Compile integration and tests
        run: bun run ci
      - name: Run HA fixture tests
        run: bun run ha:test
