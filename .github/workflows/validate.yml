name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 4 * * *"

jobs:
  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install unit test dependencies
        run: python -m pip install pytest PyYAML
      - name: Compile integration and tests
        run: python -m compileall -q custom_components tests
      - name: Run pure unit/source checks without Home Assistant plugin autoload
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q -p no:cacheprovider tests/test_*.py

  ha-fixture-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Home Assistant test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Run Home Assistant fixture tests with plugin autoload enabled
        run: pytest -q -p no:cacheprovider -c pytest-ha.ini tests/ha
