name: pre-commit-autofix

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  id-token: write

env:
  BUN_CONFIG_TELEMETRY_DISABLED: "0"
  DO_NOT_TRACK: "0"

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}
      HA_SPEC: ${{ vars.HA_VERSION != '' && format('=={0}', vars.HA_VERSION) || '2026.1.1' }}
      RUFF_TARGET_VERSION: py314
      RUFF_PATHS: custom_components/ tests/ scripts/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Bun tooling
        run: bun install

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            pyproject.toml
            .pre-commit-config.yaml
            package.json

      - name: Install deps (bun)
        run: |
          bun run install:ci
          python -m ruff --version

      - name: Ruff autofix with Python 3.14 target
        run: |
          set -o pipefail

          bun run autofix
          python scripts/ruff-baseline.py --fix custom_components/

      - name: Run pre-commit with fixes
        run: |
          set -o pipefail
          python sync_homeassistant_dependencies.py
          python gen_requirements_all.py
          python scripts.sync_requirements # Dry-run (zeigt Diff)
          python scripts.sync_requirements --write   # Schreibt Dateien
          python scripts.sync_requirements --check 
          python sync_contributor_guides.py
          python sync_localization_flags.allowlist
          python sync_localization_flags.py
          python hass_async_load_fixtures.py
          python enforce_docstring_baseline.py
          python enforce_test_requirements.py
          python enforce_test_todo_policy.py
          python sync_translations.py
          pre-commit run --all-files || true
          pre-commit run --hook-stage manual python-typing-update --check --py314-plus --ruff || true
          bun run autofix
          python scripts/ruff-baseline.py --fix custom_components/
          bun run format

      - name: Add Ruff baseline noqa for remaining diagnostics
        run: |
          set -o pipefail

          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --add-noqa \
            --output-format=github \
            --exit-zero

          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --extend-select RUF100 \
            --fix \
            --output-format=github \
            --exit-zero

      - name: Final Ruff normalization and checks
        run: |
          set -o pipefail

          bun run autofix
          python scripts/verify_py314_exception_style.py --fix custom_components/
          bun run format
          python scripts/verify_py314_exception_style.py custom_components/
          bun run format:check
          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --output-format=github \
            --exit-zero

      - name: Commit and push autofix changes
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "No autofix changes to commit."
            exit 0
          fi

          target_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- .github/workflows; then
            echo "::warning::Autofix changed .github/workflows; workflow edits need a maintainer commit."
            git restore --worktree -- .github/workflows
          fi
          git add -A
          if [ -z "$(git status --porcelain)" ]; then
            echo "No autofix changes to commit after excluding workflow edits."
            exit 0
          fi
          git commit -m "chore: apply pre-commit autofix"

          git fetch origin "${target_branch}"
          git rebase "origin/${target_branch}"
          git push origin "HEAD:${target_branch}"
