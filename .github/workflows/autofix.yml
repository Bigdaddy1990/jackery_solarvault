name: pre-commit-autofix

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  id-token: write

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}
      HA_SPEC: ${{ vars.HA_VERSION != '' && format('=={0}', vars.HA_VERSION) || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            pyproject.toml

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps (uv)
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-test.txt --prerelease=allow
          uv pip install --system --upgrade pre-commit ruff pyupgrade flake8-type-checking reorder-python-imports

      - uses: astral-sh/ruff-action@v3
      - run: ruff check --fix
      - run: ruff format
      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()
      - name: Run pre-commit with fixes
        run: |
          ruff check . --fix || true
          ruff check . --fix --unsafe-fixes || true
          ruff check . --target-version py314 || true
          ruff check . --extend-select RUF100 || true
          ruff check . --preview || true
          ruff check . --output-format=github || true
          ruff check . --exit-non-zero-on-fix || true
          ruff format
          pre-commit run --all-files || true
          pre-commit run --hook-stage manual python-typing-update --check --py314-plus --ruff || true
