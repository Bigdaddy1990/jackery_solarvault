name: pre-commit-autofix

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write
  checks: write
  id-token: write

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}
      HA_SPEC: ${{ vars.HA_VERSION != '' && format('=={0}', vars.HA_VERSION) || '' }}
      RUFF_VERSION: ${{ vars.RUFF_VERSION != '' && vars.RUFF_VERSION || '0.15.12' }}
      RUFF_TARGET_VERSION: py314
      RUFF_PATHS: custom_components/ tests/ scripts/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            pyproject.toml
            .pre-commit-config.yaml

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps (uv)
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-test.txt --prerelease=allow
          uv pip install --system --upgrade \
            "ruff==${RUFF_VERSION}" \
            pre-commit \
            pyupgrade \
            flake8-type-checking \
            reorder-python-imports
          python -m ruff --version

      - name: Ruff autofix with Python 3.14 target
        run: |
          set -o pipefail

          # Apply real Ruff fixes first. The explicit target keeps 3.14 syntax
          # stable, and unsafe fixes allow autofix to handle rules such as SIM108
          # before the workflow falls back to generated noqa baselines.
          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --fix \
            --unsafe-fixes \
            --output-format=concise \
            --exit-zero

          python -m ruff format ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}"

          # Keep Python 3.14 exception headers modern when the compact form fits.
          # Long exception groups may remain parenthesized so the result still
          # passes `ruff format --check` with the configured line length.
          python scripts/verify_py314_exception_style.py --fix custom_components/

      - name: Run pre-commit with fixes
        run: |
          set -o pipefail

          pre-commit run --all-files || true
          pre-commit run --hook-stage manual python-typing-update --check --py314-plus --ruff || true

          # Pre-commit hooks may run their own formatter instances. Normalize once
          # more with the same pinned Ruff and explicit Python 3.14 target.
          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --fix \
            --unsafe-fixes \
            --output-format=concise \
            --exit-zero

          python -m ruff format ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}"
          python scripts/verify_py314_exception_style.py --fix custom_components/
          python -m ruff format ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}"

      - name: Add Ruff baseline noqa for remaining diagnostics
        run: |
          set -o pipefail

          # Only diagnostics Ruff could not auto-fix become baseline noqa markers.
          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --add-noqa \
            --output-format=concise \
            --exit-zero

          # Remove stale noqa markers generated by older baseline/autofix runs.
          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --extend-select RUF100 \
            --fix \
            --output-format=concise \
            --exit-zero

      - name: Final Ruff normalization and checks
        run: |
          set -o pipefail

          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --fix \
            --unsafe-fixes \
            --output-format=concise \
            --exit-zero

          python -m ruff format ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}"
          python scripts/verify_py314_exception_style.py --fix custom_components/
          python -m ruff format ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}"

          python scripts/verify_py314_exception_style.py custom_components/
          python -m ruff format --check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}"
          python -m ruff check ${RUFF_PATHS} \
            --target-version "${RUFF_TARGET_VERSION}" \
            --preview \
            --output-format=github \
            --exit-zero
      - name: Commit autofix changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No autofix changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply pre-commit autofix"
          git push origin "HEAD:${GITHUB_REF_NAME}"
