name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BUN_CONFIG_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"

      - name: Install Bun tooling
        run: bun install --frozen-lockfile

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION != '' && vars.PYTHON_VERSION || '3.14' }}

      - name: Verify manifest version matches tag
        run: bun run release:verify-tag

      - name: Build release zip
        run: bun run release:zip

      - name: Publish release with auto-generated notes
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            jackery_solarvault.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
