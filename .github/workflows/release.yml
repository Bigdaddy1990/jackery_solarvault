name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/jackery_solarvault/manifest.json'))['version'])")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag '${TAG}' does not match manifest version '${MANIFEST_VERSION}'"
            exit 1
          fi
          echo "Tag and manifest both at ${TAG}"

      - name: Build release zip
        run: |
          cd custom_components/jackery_solarvault
          zip -r "$GITHUB_WORKSPACE/jackery_solarvault.zip" . \
            -x "*.pyc" "*/__pycache__/*" "*.pytest_cache*" "*.ruff_cache*"
          cd "$GITHUB_WORKSPACE"
          ls -la jackery_solarvault.zip

      - name: Publish release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            jackery_solarvault.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
