# Configuration for the Home Assistant fixture test suite under tests/ha/.
# These tests require pytest-homeassistant-custom-component and run the
# integration against a real HA test environment. Kept separate from the
# pure-Python unit tests in tests/test_*.py so contributors can run those
# without installing the heavy HA fixture stack.
[pytest]
addopts = -ra --strict-markers
testpaths = tests/ha
python_files = test_*.py
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:pytest_homeassistant_custom_component
    ignore::DeprecationWarning:homeassistant
    ignore::DeprecationWarning:aiohttp
    ignore::DeprecationWarning:voluptuous
