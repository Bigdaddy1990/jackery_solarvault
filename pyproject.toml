  #"useless-suppression",  # temporarily every now and then to clean them up
  "use-symbolic-message-instead",
]
per-file-ignores = [
  # redefined-outer-name: Tests reference fixtures in the test function
  # use-implicit-booleaness-not-comparison: Tests need to validate that a list
  # or a dict is returned
  "tests/**:redefined-outer-name,use-implicit-booleaness-not-comparison",
]

# Bandit configuration aligned with Home Assistant guidelines
[tool.bandit]
exclude_dirs = ["tests", "scripts", "docs"]
tests = []
skips = ["B101", "B102", "B110", "B112", "B307", "B324", "B410", "B603", "B608", "B612", "B703"]

[tool.cfduplication]
# Minimum duplicated line threshold
MinLineCount= 50
# Paths to ignore for duplication checking
IgnorePatterns = ["docs/**", "tests/**", "scripts/**"]
