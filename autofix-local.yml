steps:
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install deps (uv)
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements_test.txt --prerelease=allow
          uv pip install --system --upgrade pre-commit ruff pyupgrade flake8-type-checking reorder-python-imports pre-commit

      - uses: astral-sh/ruff-action@v3
        with:
         version: ">=0.4.0"
      - run: ruff check --fix
      - run: ruff format
      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()
      
      - name: Run pre-commit with fixes
        run: |
          ruff check . --fix-all || true
          ruff check . --fix --unsafe-fixes || true
          ruff check . --target-version py314 || true
          ruff check . --extend-select RUF100 || true
          ruff check . --preview || true
          ruff check . --output-format=github || true
          ruff check . --exit-non-zero-on-fix || true
          ruff format
      - name: Run pre-commit with fixes customcomponents
        run: |
          ruff check ./custom_components/ --fix-all || true
          ruff check ./custom_components/ --fix --unsafe-fixes || true
          ruff check ./custom_components/ --target-version py314 || true
          ruff check ./custom_components/ --extend-select RUF100 || true
          ruff check ./custom_components/ --preview || true
          ruff check ./custom_components/ --output-format=github || true
          ruff check ./custom_components/ --exit-non-zero-on-fix || true
          ruff format
          python -m scripts.sync_contributor_guides || true
          pre-commit run --all-files || true
          pre-commit run --hook-stage manual python-typing-update --check --py314-plus --ruff || true
          pre-commit run --all-files || true
          pre-commit run --hook-stage manual python-typing-update --check --py314-plus --ruff || true

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          ignore-nothing-to-cache: true
      - uses: astral-sh/ruff-action@v3
        with:
         version: ">=0.4.0"
      - run: ruff check --fix --preview --exit-non-zero-on-fix || true
      - run: ruff format
      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()
        
      - name: Verify contributor guides
        run: |
          python -m scripts.sync_contributor_guides --check || true

      - name: Run test requirements and localization sync
        run: |
          python -m scripts.enforce_test_requirements || true
          python scripts/enforce_docstring_baseline.py --update || true
          python -m scripts.sync_localization_flags \
            --allowlist scripts/sync_localization_flags.allowlist \
            --check || true
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pinned Ruff with Python 3.14 support
        run: |
          bun run install:ruff-baseline
          python -m ruff --version
      - name: Ruff baseline using explicit Python 3.14 target
        run: |
          set -o pipefail

          # First apply safe Ruff fixes before the workflow falls back to
          # baseline noqa markers for remaining diagnostics.
          bun run autofix

          # Only remaining non-fixable diagnostics become baseline noqa markers.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --add-noqa \
            --output-format=github \
            --exit-zero

          # Remove stale noqa markers created by older baseline runs.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --extend-select RUF100 \
            --fix \
            --output-format=github \
            --exit-zero

          # Emit final diagnostics as GitHub annotations without failing the
          # baseline job after fix/noqa generation has completed.
          python -m ruff check . \
            --target-version "${RUFF_TARGET_VERSION}" \
            --output-format=github \
            --exit-zero


